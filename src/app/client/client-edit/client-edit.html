<div class="container">
  <h1>{{ client.id ? 'Modificar cliente' : 'Crear cliente' }}</h1>

  <form>
    <mat-form-field>
      <mat-label>Identificador</mat-label>
      <input matInput [(ngModel)]="client.id" name="id" disabled>
    </mat-form-field>

    <mat-form-field>
      <mat-label>Nombre</mat-label>
      <input matInput [(ngModel)]="client.name" name="name" required>
      <mat-error>El nombre no puede estar vacío</mat-error>
    </mat-form-field>
  </form>

  <div class="buttons">
    <button mat-stroked-button (click)="onClose()">Cerrar</button>
    <button mat-flat-button color="primary" (click)="onSave()">Guardar</button>
  </div>
</div>
